    <style>
        /* --- Base & Scrollbar --- */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            /* Aura gradient wallpaper */
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            user-select: none;
            transition: background-image 0.5s ease;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(150, 150, 150, 0.8); }

        /* --- Window Styles --- */
        .os-window {
            position: absolute;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 0.75rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: opacity 0.2s ease, box-shadow 0.2s;
            min-width: 300px;
            min-height: 200px;
            resize: both; 
        }
        
        .os-window.snapped { transition: all 0.2s ease-out; resize: none; border-radius: 0; }
        .os-window.maximized {
            top: 32px !important; left: 0 !important; width: 100% !important; height: calc(100% - 32px - 80px) !important;
            border-radius: 0; resize: none; transition: all 0.2s ease-out;
        }

        .window-header { background: rgba(243, 244, 246, 0.9); border-bottom: 1px solid rgba(0, 0, 0, 0.1); cursor: default; }
        .window-body { flex: 1; overflow: hidden; position: relative; }
        .is-dragging iframe { pointer-events: none; }

        /* --- Snapping Preview Overlay --- */
        #snap-preview {
            position: absolute;
            background: rgba(59, 130, 246, 0.3);
            border: 2px solid rgba(59, 130, 246, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 0.5rem;
            pointer-events: none;
            transition: all 0.15s ease-out;
            opacity: 0;
            z-index: 9998;
        }

        /* --- Animations --- */
        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .window-enter { animation: fadeInScale 0.2s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .notification-enter { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        [contenteditable]:empty:before { content: attr(placeholder); color: #9ca3af; pointer-events: none; display: block; }
        
        /* Draggable Dock Item Styling */
        .dock-item.dragging { opacity: 0.5; transform: scale(0.9); }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px); }
    </style>
</head>

        // --- Core OS State & Logic ---
        const os = {
            state: {
                // Apps installed on the user's system
                installedApps: ['chrome', 'files', 'editor', 'calc', 'shop', 'settings'],
                // Order of apps in the bottom dock
                dockOrder: ['chrome', 'files', 'editor', 'calc', 'shop', 'settings']
            },

            apps: {
                browser: {
                    navigate: (id) => {
                        let url = document.getElementById(`url-${id}`).value;
                        if (!url.trim()) return;
                        if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
                        document.getElementById(`url-${id}`).value = url;
                        document.getElementById(`iframe-${id}`).src = url;
                    }
                },
                calc: {
                    state: {},
                    press: (id, val) => {
                        if (!os.apps.calc.state[id]) os.apps.calc.state[id] = '0';
                        let current = os.apps.calc.state[id];
                        if (val === 'DEL') current = current.length > 1 ? current.slice(0, -1) : '0';
                        else { if (current === '0' && val !== '.') current = val; else current += val; }
                        os.apps.calc.state[id] = current;
                        document.getElementById(`calc-display-${id}`).innerText = current;
                    },
                    clear: (id) => {
                        os.apps.calc.state[id] = '0';
                        document.getElementById(`calc-display-${id}`).innerText = '0';
                        document.getElementById(`calc-history-${id}`).innerText = '';
                    },
                    calculate: (id) => {
                        try {
                            let exp = os.apps.calc.state[id];
                            let result = new Function('return ' + exp)();
                            result = Math.round(result * 100000000) / 100000000;
                            document.getElementById(`calc-history-${id}`).innerText = exp + ' =';
                            document.getElementById(`calc-display-${id}`).innerText = result;
                            os.apps.calc.state[id] = result.toString();
                        } catch (e) {
                            document.getElementById(`calc-display-${id}`).innerText = 'Error';
                            os.apps.calc.state[id] = '0';
                        }
                    }
                },
                settings: {
                    handleWallpaper: (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                document.body.style.backgroundImage = `url(${e.target.result})`;
                            };
                            reader.readAsDataURL(file);
                        }
                    }
                },
                shop: {
                    render: () => {
                        // Render Shop UI for all windows that happen to have shop open
                        document.querySelectorAll('[id^="shop-list-"]').forEach(el => {
                            let html = '<div class="grid grid-cols-1 gap-4">';
                            Object.keys(AppRegistry).forEach(appId => {
                                if (appId === 'shop') return;
                                const app = AppRegistry[appId];
                                const isInstalled = os.state.installedApps.includes(appId);
                                
                                const iconHtml = app.iconSvg || `<i data-lucide="${app.icon}" class="w-8 h-8 text-white"></i>`;
                                const bgClass = app.color || 'bg-gray-500';

                                html += `
                                    <div class="flex items-center justify-between p-4 bg-white border border-gray-200 rounded-xl shadow-sm">
                                        <div class="flex items-center gap-4">
                                            <div class="w-14 h-14 ${bgClass} rounded-xl flex items-center justify-center shadow-inner">
                                                ${iconHtml}
                                            </div>
                                            <div>
                                                <h4 class="font-bold text-lg">${app.title}</h4>
                                                <p class="text-sm text-gray-500">Official Aura App</p>
                                            </div>
                                        </div>
                                        <button onclick="os.apps.shop.toggleInstall('${appId}')" class="px-5 py-2 rounded-full font-bold text-sm transition ${isInstalled ? 'bg-gray-100 text-gray-600 hover:bg-gray-200 border border-gray-300' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-md'}">
                                            ${isInstalled ? 'Remove' : 'Install'}
                                        </button>
                                    </div>
                                `;
                            });
                            html += '</div>';
                            el.innerHTML = html;
                            lucide.createIcons({ root: el });
                        });
                    },
                    toggleInstall: (appId) => {
                        if (os.state.installedApps.includes(appId)) {
                            // Uninstall
                            os.state.installedApps = os.state.installedApps.filter(id => id !== appId);
                            os.state.dockOrder = os.state.dockOrder.filter(id => id !== appId);
                        } else {
                            // Install
                            os.state.installedApps.push(appId);
                            os.state.dockOrder.push(appId);
                        }
                        os.renderDock();
                        os.renderDesktop();
                        os.apps.shop.render(); // Update button states
                    }
                }
            },

            // --- UI Rendering (Dock & Desktop) ---
            renderDock: () => {
                const container = document.getElementById('dock-container');
                container.innerHTML = '';
                
                os.state.dockOrder.forEach(appId => {
                    const app = AppRegistry[appId];
                    if (!app) return;

                    const btn = document.createElement('button');
                    btn.className = 'dock-item group relative p-2 rounded-xl hover:bg-white/20 transition duration-200';
                    btn.draggable = true;
                    btn.dataset.id = appId;
                    btn.onclick = () => os.openApp(appId);
                    
                    // Drag and Drop Events for Dock Reordering
                    btn.addEventListener('dragstart', function(e) {
                        this.classList.add('dragging');
                        e.dataTransfer.setData('text/plain', appId);
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    btn.addEventListener('dragend', function() {
                        this.classList.remove('dragging');
                    });
                    btn.addEventListener('dragover', function(e) {
                        e.preventDefault(); // Necessary to allow dropping
                        e.dataTransfer.dropEffect = 'move';
                    });
                    btn.addEventListener('drop', function(e) {
                        e.stopPropagation();
                        const draggedId = e.dataTransfer.getData('text/plain');
                        const targetId = this.dataset.id;
                        if (draggedId && draggedId !== targetId) {
                            // Swap in dockOrder array
                            let arr = os.state.dockOrder;
                            let from = arr.indexOf(draggedId);
                            let to = arr.indexOf(targetId);
                            arr.splice(to, 0, arr.splice(from, 1)[0]);
                            os.renderDock(); // Re-render to show new order
                        }
                    });

                    const iconHtml = app.iconSvg || `<i data-lucide="${app.icon}" class="w-6 h-6 text-white"></i>`;
                    const bgClass = app.color || 'bg-gray-500';

                    btn.innerHTML = `
                        <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-black/80 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">${app.title}</div>
                        <div class="w-12 h-12 ${bgClass} rounded-xl flex items-center justify-center shadow-lg transform group-hover:-translate-y-2 group-hover:scale-110 transition duration-200">
                            ${iconHtml}
                        </div>
                    `;
                    container.appendChild(btn);
                });
                lucide.createIcons({ root: container });
            },

            renderDesktop: () => {
                const container = document.getElementById('desktop-icons');
                container.innerHTML = '';
                
                os.state.installedApps.forEach(appId => {
                    const app = AppRegistry[appId];
                    if (!app) return;

                    const div = document.createElement('div');
                    div.className = 'desktop-icon flex flex-col items-center gap-1 cursor-pointer w-20 p-2 rounded-xl transition duration-200 text-center';
                    div.onclick = () => os.openApp(appId);

                    const iconHtml = app.iconSvg ? app.iconSvg.replace('w-6 h-6', 'w-8 h-8 drop-shadow-md') : `<i data-lucide="${app.icon}" class="w-8 h-8 text-white drop-shadow-md"></i>`;

                    div.innerHTML = `
                        <div class="w-12 h-12 flex items-center justify-center">
                            ${iconHtml}
                        </div>
                        <span class="text-xs font-medium text-white drop-shadow-md" style="text-shadow: 0 1px 3px rgba(0,0,0,0.8);">${app.title.split(' ')[0]}</span>
                    `;
                    container.appendChild(div);
                });
                lucide.createIcons({ root: container });
            },

            showNotification: (opts) => {
                const container = document.getElementById('notifications-container');
                const notif = document.createElement('div');
                notif.className = 'bg-white/90 backdrop-blur-md border border-white/20 p-4 rounded-xl shadow-2xl flex gap-3 text-black notification-enter pointer-events-auto';
                notif.innerHTML = `
                    <div class="text-blue-500 shrink-0 mt-0.5"><i data-lucide="${opts.icon || 'bell'}" class="w-5 h-5"></i></div>
                    <div>
                        <h4 class="font-bold text-sm leading-tight mb-1">${opts.title}</h4>
                        <p class="text-xs text-gray-600 leading-relaxed">${opts.message}</p>
                    </div>
                    <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-4 h-4"></i></button>
                `;
                container.appendChild(notif);
                lucide.createIcons({ root: notif });
                setTimeout(() => {
                    if (notif.parentElement) {
                        notif.style.opacity = '0';
                        notif.style.transform = 'translateX(100%)';
                        notif.style.transition = 'all 0.3s ease';
                        setTimeout(() => notif.remove(), 300);
                    }
                }, 6000);
            },

            openApp: (appId) => {
                const app = AppRegistry[appId];
                if (!app) return;

                windowCounter++;
                highestZIndex++;
                const winId = `win-${windowCounter}`;
                
                // Calculate center spawn position
                const startLeft = Math.max(0, (window.innerWidth - app.width) / 2 + (Math.random() * 40 - 20));
                const startTop = Math.max(32, (window.innerHeight - app.height) / 2 + (Math.random() * 40 - 20));

                const winHtml = `
                    <div id="${winId}" class="os-window window-enter" style="width: ${app.width}px; height: ${app.height}px; top: ${startTop}px; left: ${startLeft}px; z-index: ${highestZIndex};">
                        <!-- Header / Drag area -->
                        <div class="window-header flex items-center justify-between px-3 py-2 select-none" onmousedown="os.startDrag(event, '${winId}')" ondblclick="os.toggleMaximize('${winId}')">
                            <div class="flex gap-2 window-controls">
                                <button onclick="document.getElementById('${winId}').remove()" class="w-3.5 h-3.5 rounded-full bg-red-500 hover:bg-red-600 flex items-center justify-center group shadow-sm">
                                    <i data-lucide="x" class="w-2.5 h-2.5 text-red-900 opacity-0 group-hover:opacity-100 transition"></i>
                                </button>
                                <button onclick="os.toggleMaximize('${winId}')" class="w-3.5 h-3.5 rounded-full bg-yellow-400 hover:bg-yellow-500 flex items-center justify-center group shadow-sm">
                                    <i data-lucide="minus" class="w-2.5 h-2.5 text-yellow-900 opacity-0 group-hover:opacity-100 transition"></i>
                                </button>
                                <button onclick="os.toggleMaximize('${winId}')" class="w-3.5 h-3.5 rounded-full bg-green-500 hover:bg-green-600 flex items-center justify-center group shadow-sm">
                                    <i data-lucide="maximize-2" class="w-2.5 h-2.5 text-green-900 opacity-0 group-hover:opacity-100 transition"></i>
                                </button>
                            </div>
                            <div class="text-xs font-semibold text-gray-700 pointer-events-none">${app.title}</div>
                            <div class="w-12"></div> <!-- Spacer -->
                        </div>
                        <!-- Content -->
                        <div class="window-body">
                            ${app.content(winId)}
                        </div>
                    </div>
                `;

                document.getElementById('desktop').insertAdjacentHTML('beforeend', winHtml);
                const newWin = document.getElementById(winId);
                newWin.addEventListener('mousedown', () => os.bringToFront(winId));
                lucide.createIcons({ root: newWin });

                if (appId === 'shop') os.apps.shop.render();
            },

            bringToFront: (winId) => {
                highestZIndex++;
                const win = document.getElementById(winId);
                if (win) win.style.zIndex = highestZIndex;
            },

            toggleMaximize: (winId) => {
                const win = document.getElementById(winId);
                if (!win) return;
                
                // If it was snapped, remove snap first
                if (win.dataset.preSnapState) {
                    const state = JSON.parse(win.dataset.preSnapState);
                    win.style.width = state.width;
                    win.style.height = state.height;
                    win.style.top = state.top;
                    win.style.left = state.left;
                    win.classList.remove('snapped');
                    delete win.dataset.preSnapState;
                    return; // Unsnapped!
                }

                if (win.classList.contains('maximized')) {
                    win.classList.remove('maximized');
                } else {
                    // Save bounds before maximize so we can restore
                    if(!win.dataset.preSnapState) {
                        win.dataset.preSnapState = JSON.stringify({
                            width: win.style.width, height: win.style.height, top: win.style.top, left: win.style.left
                        });
                    }
                    win.classList.add('maximized');
                }
            },

            // --- Window Dragging & Advanced Snapping Logic ---
            dragState: { isDragging: false, element: null, offsetX: 0, offsetY: 0, snapTarget: null },
            
            startDrag: (e, winId) => {
                if (e.target.closest('.window-controls')) return; // Ignore buttons
                
                const win = document.getElementById(winId);
                os.bringToFront(winId);
                
                // If maximized or snapped, "tear off" and restore size
                if (win.classList.contains('maximized') || win.classList.contains('snapped')) {
                    win.classList.remove('maximized');
                    win.classList.remove('snapped');
                    if (win.dataset.preSnapState) {
                        const state = JSON.parse(win.dataset.preSnapState);
                        win.style.width = state.width;
                        win.style.height = state.height;
                        delete win.dataset.preSnapState;
                    }
                    // Adjust offsets so mouse grabs center of titlebar
                    const newLeft = Math.max(0, e.clientX - parseInt(win.style.width)/2);
                    win.style.left = newLeft + 'px';
                }

                win.classList.add('is-dragging');
                
                os.dragState.isDragging = true;
                os.dragState.element = win;
                os.dragState.offsetX = e.clientX - win.offsetLeft;
                os.dragState.offsetY = e.clientY - win.offsetTop;

                document.addEventListener('mousemove', os.doDrag);
                document.addEventListener('mouseup', os.stopDrag);
            },

            doDrag: (e) => {
                if (!os.dragState.isDragging) return;
                const win = os.dragState.element;
                const preview = document.getElementById('snap-preview');
                
                let newX = e.clientX - os.dragState.offsetX;
                let newY = e.clientY - os.dragState.offsetY;
                if (newY < 32) newY = 32; // Top bar boundary
                
                win.style.left = `${newX}px`;
                win.style.top = `${newY}px`;

                // Calculate Snapping logic
                const screenW = window.innerWidth;
                const screenH = window.innerHeight;
                const edgeThreshold = 20;

                os.dragState.snapTarget = null;
                
                if (e.clientY <= 32 + edgeThreshold) { // Snap to top -> Maximize
                    os.dragState.snapTarget = 'maximize';
                    preview.style.left = '5px'; preview.style.top = '37px';
                    preview.style.width = 'calc(100% - 10px)'; preview.style.height = 'calc(100% - 37px - 85px)';
                    preview.style.opacity = '1';
                } else if (e.clientX <= edgeThreshold) { // Snap Left Half
                    os.dragState.snapTarget = 'left';
                    preview.style.left = '5px'; preview.style.top = '37px';
                    preview.style.width = 'calc(50% - 5px)'; preview.style.height = 'calc(100% - 37px - 85px)';
                    preview.style.opacity = '1';
                } else if (e.clientX >= screenW - edgeThreshold) { // Snap Right Half
                    os.dragState.snapTarget = 'right';
                    preview.style.left = '50%'; preview.style.top = '37px';
                    preview.style.width = 'calc(50% - 5px)'; preview.style.height = 'calc(100% - 37px - 85px)';
                    preview.style.opacity = '1';
                } else {
                    preview.style.opacity = '0';
                }
            },

            stopDrag: () => {
                if (!os.dragState.isDragging) return;
                
                const win = os.dragState.element;
                const snapTarget = os.dragState.snapTarget;
                const preview = document.getElementById('snap-preview');
                
                win.classList.remove('is-dragging');
                preview.style.opacity = '0'; // Hide preview

                if (snapTarget) {
                    // Save original bounds before snapping
                    if(!win.dataset.preSnapState) {
                        win.dataset.preSnapState = JSON.stringify({
                            width: win.style.width, height: win.style.height, top: win.style.top, left: win.style.left
                        });
                    }

                    win.classList.add('snapped');
                    
                    if (snapTarget === 'maximize') {
                        win.style.top = '32px'; win.style.left = '0';
                        win.style.width = '100%'; win.style.height = 'calc(100% - 32px - 80px)';
                    } else if (snapTarget === 'left') {
                        win.style.top = '32px'; win.style.left = '0';
                        win.style.width = '50%'; win.style.height = 'calc(100% - 32px - 80px)';
                    } else if (snapTarget === 'right') {
                        win.style.top = '32px'; win.style.left = '50%';
                        win.style.width = '50%'; win.style.height = 'calc(100% - 32px - 80px)';
                    }
                }

                os.dragState.isDragging = false;
                os.dragState.element = null;
                document.removeEventListener('mousemove', os.doDrag);
                document.removeEventListener('mouseup', os.stopDrag);
            }
        };

        // --- Initialization & Loop ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerText = `${hours}:${minutes} ${ampm}`;
        }

        function initAuraOS() {
            // Initial Render
            os.renderDock();
            os.renderDesktop();
            
            setInterval(updateClock, 1000);
            updateClock();

            // Boot Sequence Animation
            const bootScreen = document.getElementById('aura-boot-screen');
            setTimeout(() => {
                bootScreen.style.opacity = '0';
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    
                    // Welcome
                    os.openApp('shop'); // Open Shop to demo it immediately
                    
                    setTimeout(() => {
                        os.showNotification({
                            title: "AuraOS v3 Launched!",
                            message: "Added Google Chrome, Custom Wallpapers, App Store, Desktop Icons, and Window Snapping!",
                            icon: "sparkles"
                        });
                    }, 500);

                    // Drag a window to the left or right edge to test snapping!
                    setTimeout(() => {
                        os.showNotification({
                            title: "Pro Tip: Window Snapping",
                            message: "Drag any window directly to the left, right, or top edge of your screen to snap it into place.",
                            icon: "layout"
                        });
                    }, 8000);

                }, 1000);
            }, 1500);
        }

        window.addEventListener('load', initAuraOS);

    </script>
</body>
